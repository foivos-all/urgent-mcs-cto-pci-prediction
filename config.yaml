data_path: "data/for_score.csv"
target: "lv_assist2_aae___2"
random_state: 42
test_size: 0.20
cv_splits: 5
n_boot_ci: 2000
n_repeated_cv: 20
cat_max_levels: 20
fast_mode: false

k_grid: [10, 15, 25, "all"]

yesno_na_vars:
  - "use_of_acei"
  - "use_of_arb"
  - "use_of_aspirin"
  - "use_of_ezetimibe"
  - "use_of_pcsk9i"
  - "use_of_statins"
  - "ranolazine_yesno"
  - "beta_blockers_yesno"
  - "long_acting_nitr_yesno"
  - "calcium_channel_block"

redundant_groups:
  - ["calcification_med_sev", "j_cto_calcification_score"]
  - ["lmcto", "target_vessel_overall"]
  - ["j_cto_lesion_length", "occlusion_length_mm"]
  - ["j_cto_tortuosity_score_1_f", "tortuosity_med_sev"]
  - ["left_ventr_ejection_fract", "lvef40", "lvef50", "prior_heart_failure"]

tripod:
  deployable_model: "LogReg_Firth"
  deployable_variant: "flic"    # firth | flic | flac (flic = Firth ORs + ML-corrected intercept)
  benchmark_model: "ExtraTrees"
  use_synth_if_missing: true    # build a synthetic cohort if data_path is absent (dry run only)
  tripod_output_dir: "tripod_outputs"
  exclude_planned_mcs: true
  planned_mcs_col: "lv_assist2_aae___1"
  site_col: "center"
  year_col: "year_of_procedure"
  n_boot_optimism: 500
  pre_specified_predictors:
    - retro
    - left_ventr_ejection_fract
    - occlusion_length_mm
    - proximal_cap_ambiguity
    - age_manual_input
    - acs
    - calcification_med_sev
    - peripheral_arterial_diseas
  plausible_bounds:
    left_ventr_ejection_fract: [5, 80]
    occlusion_length_mm: [1, 200]
    age_manual_input: [18, 110]
  score_increments:
    left_ventr_ejection_fract: -10
    occlusion_length_mm: 10
    age_manual_input: 10
  points_max: 10
  pub_vars:
    retro: "retro"
    lvef: "left_ventr_ejection_fract"
    length: "occlusion_length_mm"
  pub_pts:
    retro_yes: 45.0
    lvef_ref: 80.0
    lvef_per_pct_below_ref: 1.4
    length_per_mm: 0.667
  published_betas: null
